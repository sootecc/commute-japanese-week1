<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <meta name="theme-color" content="#173447">
  <meta name="description" content="소리·모라·고저 악센트부터 여행 회화까지 이어지는 5개월 출근길 일본어 학습">
  <title>출근길 일본어 첫걸음</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;600;700&family=Noto+Sans+KR:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles.css">
</head>
<body>
  <header class="topbar">
    <a class="brand" href="#top" aria-label="처음으로">
      <span class="brand-mark">あ</span>
      <span>출근길 일본어</span>
    </a>
    <div class="progress-mini" aria-label="주간 진도">
      <span id="progressText">0 / 7일</span>
      <span class="progress-track"><span id="progressBar"></span></span>
    </div>
  </header>

  <main id="top">
    <section class="hero">
      <div class="eyebrow">20 WEEKS · JAPAN TRAVEL</div>
      <h1>5개월 뒤에는,<br><em>일본어로 여행</em>하기.</h1>
      <p>문자부터 자유 대화까지 이어지는 140일 루틴.<br>하루 20~30분, 잘 붙는 날은 한 걸음 더 가요.</p>
      <button class="primary-button" id="resumeButton" type="button">오늘 학습 시작</button>
      <div class="hero-note">저장 버튼 없이 이 기기에 자동 기록됩니다.</div>
      <div class="hero-glyphs" aria-hidden="true">
        <span>あ</span><span>か</span><span>さ</span>
      </div>
    </section>

    <section class="dashboard">
      <div>
        <span class="section-kicker">FIVE MONTHS</span>
        <h2>문자에서 여행 대화까지</h2>
      </div>
      <div class="stats">
        <div><strong>140</strong><span>일</span></div>
        <div><strong>20</strong><span>주</span></div>
        <div><strong>20</strong><span>분/일</span></div>
      </div>
    </section>

    <nav class="month-tabs" id="monthTabs" aria-label="월 선택"></nav>
    <nav class="week-tabs" id="weekTabs" aria-label="주차 선택"></nav>
    <nav class="day-tabs" id="dayTabs" aria-label="날짜 선택"></nav>

    <section class="lesson-shell" id="lesson" aria-live="polite"></section>

    <section class="week-check" id="weekCheck"></section>
  </main>

  <footer>
    <span>5개월 뒤 일본 여행을 위한 140일 과정</span>
    <a href="#top">맨 위로 ↑</a>
  </footer>

  <div class="audio-toast" id="audioToast" role="status" aria-live="polite"></div>
  <script src="./month-data.js"></script>
  <script src="./five-month-data.js"></script>
  <script src="./standard-audio.js"></script>
  <script src="./app.js"></script>
</body>
</html>
